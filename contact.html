<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact </title>
  <link rel="icon" href="images/logo1.jpg" type="image/jpeg">
  <link rel="stylesheet" href="https://use.typekit.net/axs2fnr.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0a0a0a; --secondary: #e8c547; --accent: #d62246; --light: #f8f8f8; --dark: #121212; --text: #333; --gold-gradient: linear-gradient(135deg, #e8c547 0%, #d4af37 100%); --section-bg: #f9f9f9; --font-heading: "orpheus-pro", serif; --font-body: "aktiv-grotesk", sans-serif; --transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); }
    @font-face { font-family: 'Neue Machina'; src: url('https://fonts.cdnfonts.com/css/neue-machina') format('woff2'); font-weight: 400; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--text); background-color: var(--dark); line-height: 1.8; overflow-x: hidden; -webkit-font-smoothing: antialiased; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0); background-size: 25px 25px; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Neue Machina', sans-serif; font-weight: 700; letter-spacing: -0.5px; }
    .main-nav { position: fixed; top: 0; left: 0; width: 100%; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; transition: all 0.5s ease; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); box-shadow: 0 5px 30px rgba(0,0,0,0.1); }
    .logo img { height: 40px; transition: var(--transition); }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: white; text-decoration: none; font-weight: 500; position: relative; transition: var(--transition); }
    .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--secondary); transition: var(--transition); }
    .nav-links a:hover::after { width: 100%; }
    .mobile-menu-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    .contact-section { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 8rem 2rem 2rem; animation: fadeIn 1s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .contact-container { display: grid; grid-template-columns: 1fr 1.5fr; max-width: 1200px; width: 100%; background: #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid rgba(232, 197, 71, 0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(232, 197, 71, 0.1); }
    .contact-info { background: var(--primary); padding: 3rem; color: white; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid rgba(232, 197, 71, 0.2); }
    .contact-info h2 { font-size: 2.5rem; margin-bottom: 1rem; background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .contact-info p { opacity: 0.8; margin-bottom: 3rem; }
    .info-item { display: flex; align-items: center; margin-bottom: 2rem; }
    .info-item i { font-size: 1.5rem; color: var(--secondary); margin-right: 1.5rem; width: 30px; text-align: center; }
    .info-item a { color: white; text-decoration: none; transition: color 0.3s; font-size: 1.1rem; }
    .info-item a:hover { color: var(--secondary); }
    .contact-form-container { padding: 3rem; }
    .contact-form-container h2 { color: white; font-size: 2.5rem; margin-bottom: 2rem; text-align: center; }
    .form-group { margin-bottom: 1.5rem; position: relative; }
    .form-control { width: 100%; padding: 1rem; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; color: white; font-family: var(--font-body); font-size: 1rem; transition: border-color 0.3s, box-shadow 0.3s; }
    .form-control:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 15px rgba(232, 197, 71, 0.2); }
    textarea.form-control { resize: vertical; min-height: 120px; }
    .submit-btn { width: 100%; padding: 1rem; background: var(--gold-gradient); border: none; border-radius: 5px; color: var(--dark); font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(232, 197, 71, 0.2); }
    #form-status { margin-top: 1.5rem; padding: 1rem; border-radius: 5px; text-align: center; display: none; font-weight: 500; }
    #form-status.success { background: #1e4620; color: #a3d9a5; border: 1px solid #3c8d40; }
    #form-status.error { background: #5a1d1d; color: #f8baba; border: 1px solid #a73c3c; }
    @media (max-width: 992px) { .contact-container { grid-template-columns: 1fr; } .contact-info { border-right: none; border-bottom: 1px solid rgba(232, 197, 71, 0.2); } }
    @media (max-width: 768px) { .nav-links { display: none; } .mobile-menu-btn { display: block; } }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="main-nav">
    <a href="index.html" class="logo">
      <img src="images/logo1.jpg" alt="Aarush Sharma Logo">
    </a>
    <div class="nav-links">
      <a href="index.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <button class="mobile-menu-btn">
      <i class="fas fa-bars"></i>
    </button>
  </nav>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="contact-container">
      <div class="contact-info">
        <h2>Let's Connect</h2>
        <p>Ready to start a project or just want to say hi? Use the form or contact me directly through my channels.</p>
        <div class="info-item">
          <i class="fas fa-envelope"></i>
          <a href="mailto:sarush066@gmail.com">sarush066@gmail.com</a>
        </div>
        <div class="info-item">
          <i class="fab fa-whatsapp"></i>
          <a href="https://wa.me/919805871693" target="_blank">+91 9805871693</a>
        </div>
        <div class="info-item">
          <i class="fab fa-instagram"></i>
          <a href="https://www.instagram.com/pandit.2.0/" target="_blank">@pandit.2.0</a>
        </div>
      </div>
      <div class="contact-form-container">
        <h2>Send a Message</h2>
        <form id="contactForm" action="https://formspree.io/f/myznzvjp" method="POST">
          <div class="form-group">
            <input type="text" name="name" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
          </div>
          <div class="form-group">
            <input type="tel" name="whatsapp" class="form-control" placeholder="WhatsApp Number" required>
          </div>
          <div class="form-group">
            <textarea class="form-control" name="message" placeholder="Tell us about your project" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
        <div id="form-status"></div>
      </div>
    </div>
  </section>

  <script>
    var form = document.getElementById("contactForm");
    
    async function handleSubmit(event) {
      event.preventDefault();
      var status = document.getElementById("form-status");
      var data = new FormData(event.target);
      
      fetch(event.target.action, {
        method: form.method,
        body: data,
        headers: {
            'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          status.innerHTML = "Thank you for your message! We will get back to you on WhatsApp shortly.";
          status.className = 'success';
          status.style.display = 'block';
          form.reset();
        } else {
          response.json().then(data => {
            if (Object.hasOwn(data, 'errors')) {
              status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
            } else {
              status.innerHTML = "Oops! There was a problem submitting your form.";
            }
            status.className = 'error';
            status.style.display = 'block';
          })
        }
      }).catch(error => {
        status.innerHTML = "Oops! There was a problem submitting your form.";
        status.className = 'error';
        status.style.display = 'block';
      });
    }
    form.addEventListener("submit", handleSubmit)
  </script>

</body>
</html>
